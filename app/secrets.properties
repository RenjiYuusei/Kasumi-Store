# Plaintext URL nguồn data của app. File này KHÔNG được package vào APK
# (nằm ngoài src/main/resources), Gradle chỉ đọc tại build-time để mã hoá
# rồi sinh ra build/generated/.../SecureStrings.kt.
#
# Mỗi lần build, một AES-256 key mới (random) được tạo và dùng để encrypt
# hai URL bên dưới — owner không cần xoay key thủ công.
#
# Có thể override qua env khi build CI: KASUMI_APPS_URL / KASUMI_SCRIPTS_URL.
#
# === KHUYẾN NGHỊ: dùng Cloudflare Worker proxy (xem worker/README.md) ===
# Sau khi deploy worker xong, đổi 2 URL bên dưới sang URL worker, ví dụ:
#   appsUrl=https://kasumi-store-proxy.<your-account>.workers.dev/apps.json
#   scriptsUrl=https://kasumi-store-proxy.<your-account>.workers.dev/scripts.json
# Worker giữ GitHub PAT, app không nhúng token gì cả. Sniff HTTPS request
# chỉ thấy URL workers.dev, không thấy raw.githubusercontent.com / token.
appsUrl=https://raw.githubusercontent.com/RenjiYuusei/Kasumi-Store/main/source/apps.json
scriptsUrl=https://raw.githubusercontent.com/RenjiYuusei/Kasumi-Store/main/source/scripts.json
